spring:
  application:
    name: ai-code-generator

server:
  port: 8123
  servlet:
    context-path: /api

# springdoc-openapi
springdoc:
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.yyh.ai_code_generator.controller
# knife4j
knife4j:
  enable: true
  setting:
    language: zh_cn
